name: paprika_merchant
description: "Paprika Merchant — receive and manage payments for your business."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State, routing, HTTP
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  dio: ^5.7.0

  # Models & codegen
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3

  # Realtime + QR
  web_socket_channel: ^3.0.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Share + Print
  share_plus: ^10.0.0
  printing: ^5.13.0
  pdf: ^3.11.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.0

  # Push notifications
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # Image picker (gallery scan on company/merchant scan screens)
  image_picker: ^1.1.0

  # Spoken-amount announcement
  flutter_tts: ^4.2.0
  audio_session: ^0.2.3
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/paprika-icon-launchert.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F04058"
  adaptive_icon_foreground: "assets/images/paprika-icon-launchert.png"


flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/paprika-icon-launchert.png"
  android_12:
    color: "#FFFFFF"
  android: true
  ios: true


